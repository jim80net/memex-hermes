name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  # NOTE: id-token: write (OIDC for trusted PyPI publishing) is granted ONLY at
  # the publish-pypi job level (see that job's `permissions:` block) — NOT here.
  # Least privilege keeps it off the release-please/build jobs, which run
  # third-party actions and dependency installs.

jobs:
  release-please:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}

    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            bun-target: bun-linux-x64
          - os: ubuntu-24.04-arm
            platform: linux-arm64
            bun-target: bun-linux-arm64
          - os: macos-latest
            platform: darwin-arm64
            bun-target: bun-darwin-arm64
          - os: windows-latest
            platform: win32-x64
            bun-target: bun-windows-x64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: oven-sh/setup-bun@v2

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Build binary
        run: bun run build.ts --target ${{ matrix.bun-target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: tar -czf memex-hermes-${{ matrix.platform }}.tar.gz -C dist/${{ matrix.platform }} .

      - name: Package (windows)
        if: runner.os == 'Windows'
        run: Compress-Archive -Path dist/${{ matrix.platform }}/* -DestinationPath memex-hermes-${{ matrix.platform }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: memex-hermes-${{ matrix.platform }}
          path: memex-hermes-${{ matrix.platform }}.*

  publish-binaries:
    needs: [release-please, build]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        working-directory: artifacts
        run: sha256sum * > checksums.txt

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.release-please.outputs.tag_name }}" \
            artifacts/* \
            --repo "${{ github.repository }}"

  publish-pypi:
    needs: [release-please]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    # OIDC trusted publishing — no PYPI_API_TOKEN secret required once
    # the publisher is configured at pypi.org under
    # /manage/account/publishing/. Until OIDC is configured, this job
    # will fail at the upload step with an explanatory message; that
    # failure is the trigger to configure the trusted publisher.
    #
    # TODO(distribution): configure the PyPI trusted publisher for
    # repo `jim80net/memex-hermes`, workflow `release-please.yml`,
    # environment (none / `pypi`). See:
    # https://docs.pypi.org/trusted-publishers/
    environment:
      name: pypi
      url: https://pypi.org/p/memex-hermes
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: python -m pip install build

      - name: Build sdist + wheel
        run: python -m build --sdist --wheel --outdir dist-py

      - name: Publish to PyPI via OIDC
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist-py
