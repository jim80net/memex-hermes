name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typescript:
    name: TypeScript (pnpm + bun)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

  python:
    name: Python (mypy + ruff + pytest)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Type check (mypy --strict)
        run: mypy --strict memex_hermes

      - name: Lint (ruff)
        run: ruff check memex_hermes test/python

      - name: Test (pytest)
        run: pytest test/python -q

  integration-smoke:
    name: Integration smoke (Linux binary build + E2E gate)
    needs: typescript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install Node + Python deps
        run: |
          pnpm install --frozen-lockfile
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Build memex-hermes binary
        run: bun run build.ts

      - name: Verify binary artifact
        run: |
          test -x dist/linux-x64/memex-hermes
          ls -l dist/linux-x64/

      - name: Run E2E-gated tests
        env:
          MEMEX_E2E: "1"
          # Point the runner at the freshly-built binary so any test that
          # exercises the subprocess path picks it up. test/e2e/ does not
          # yet exist (§11 is a separate agent); until then the python
          # suite is exercised under the gate as a graceful no-op so this
          # job has something to assert.
          MEMEX_HERMES_BINARY: ${{ github.workspace }}/dist/linux-x64/memex-hermes
        run: |
          if [ -d test/e2e ]; then
            pytest test/e2e -q
          else
            echo "test/e2e/ not yet present; running pytest with MEMEX_E2E=1 as a smoke gate"
            pytest test/python -q
          fi

  wheel-builds:
    name: Wheel build (sanity check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install build
        run: python -m pip install build

      - name: Build wheel
        run: python -m build --wheel --outdir dist-wheel

      - name: Verify wheel contents
        run: |
          set -e
          WHEEL=$(ls dist-wheel/*.whl | head -n 1)
          echo "Inspecting $WHEEL"
          unzip -l "$WHEEL"
          # R1 from hermes-plugin-packaging: the materialize script
          # must be packaged; bin/ + plugin.yaml must ship for the
          # install path; the discovery heuristic literals must
          # survive packaging.
          unzip -l "$WHEEL" | grep -q "memex_hermes/install.py"
          unzip -l "$WHEEL" | grep -q "memex_hermes/bin/memex"
          unzip -l "$WHEEL" | grep -q "memex_hermes/bin/install.sh"
          unzip -l "$WHEEL" | grep -q "memex_hermes/plugin.yaml"
          unzip -l "$WHEEL" | grep -q "memex_hermes/checksums.txt"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: memex-hermes-wheel
          path: dist-wheel/*.whl
