[pytest]
# Local pytest config for the e2e suite. Kept separate from the
# top-level [tool.pytest.ini_options] in pyproject.toml (which scopes
# the default test collection to test/python) so that:
#
#   pytest test/e2e -v
#
# discovers these tests without modifying the committed pyproject
# config — the §9 distribution agent owns pyproject changes for v1.
#
# Markers:
#   e2e — applied to every test in this directory by conftest.py;
#         gated by the MEMEX_E2E=1 env var.
markers =
    e2e: end-to-end integration test against a real Hermes home + memex binary

asyncio_mode = auto
