; Local mypy config for the e2e suite. Run from the repo root as:
;
;     mypy --strict --config-file test/e2e/mypy.ini test/e2e
;
; or rely on the wrapper `make e2e-typecheck` (not added in v1; see README).
;
; The mypy_path entry below makes `from fixtures import ...` resolvable
; even though `test/` is not a package — pytest discovers `fixtures` via
; conftest.py's sys.path insertion, but mypy needs an explicit hint.

[mypy]
strict = True
warn_unused_ignores = True
warn_redundant_casts = True
disallow_untyped_defs = True
mypy_path = test/e2e
explicit_package_bases = True
namespace_packages = True

[mypy-fixtures]
; The flat helper module that conftest.py and every test imports.
; Lives at test/e2e/fixtures.py; pytest puts it on sys.path at
; collection time and mypy_path replicates the same for static
; type-checking.
ignore_missing_imports = False
